name: 'DevDiag'
description: 'Run DevDiag diagnostic scan and annotate findings in GitHub Actions'
inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  profile:
    description: 'Diagnostic profile (e.g., ai-ml)'
    required: false
    default: ''
  redact:
    description: 'Redaction level: default, strict, off'
    required: false
    default: 'default'
  ci:
    description: 'Force CI/local parity collection and evaluation'
    required: false
    default: 'true'
  summary:
    description: 'Write a short GitHub job summary'
    required: false
    default: 'true'
  fail-on-findings:
    description: 'Fail the action when DevDiag reports high or critical findings'
    required: false
    default: 'true'
  fail-severity:
    description: 'Minimum finding severity that fails the action: off, info, low, medium, high, critical'
    required: false
    default: 'high'
  mask-values:
    description: 'Newline-separated literal values to register with GitHub add-mask before running DevDiag'
    required: false
    default: ''
  artifact-name:
    description: 'Name for the uploaded JSON report artifact'
    required: false
    default: 'devdiag-report'
  format:
    description: 'Output format: github, json, markdown'
    required: false
    default: 'github'
outputs:
  report-path:
    description: 'Path to the generated JSON report artifact'
    value: ${{ steps.devdiag.outputs.report-path }}
runs:
  using: 'composite'
  steps:
    - id: devdiag
      run: |
        if ! command -v devdiag &> /dev/null; then
          echo "devdiag not found in PATH"
          exit 1
        fi
        normalize_bool() {
          case "${1,,}" in
            true|1|yes) echo "true" ;;
            false|0|no) echo "false" ;;
            *) return 1 ;;
          esac
        }
        if ! CI_ENABLED=$(normalize_bool "$CI"); then
          echo "ci input must be true or false"
          exit 2
        fi
        if ! SUMMARY_ENABLED=$(normalize_bool "$SUMMARY"); then
          echo "summary input must be true or false"
          exit 2
        fi
        if ! FAIL_ON_FINDINGS_ENABLED=$(normalize_bool "$FAIL_ON_FINDINGS"); then
          echo "fail-on-findings input must be true or false"
          exit 2
        fi
        normalize_fail_severity() {
          case "${1,,}" in
            off|info|low|medium|high|critical) echo "${1,,}" ;;
            *) return 1 ;;
          esac
        }
        if ! FAIL_SEVERITY_NORMALIZED=$(normalize_fail_severity "$FAIL_SEVERITY"); then
          echo "fail-severity input must be one of: off, info, low, medium, high, critical"
          exit 2
        fi
        if [ "$FAIL_ON_FINDINGS_ENABLED" = "false" ]; then
          EFFECTIVE_FAIL_SEVERITY="off"
        else
          EFFECTIVE_FAIL_SEVERITY="$FAIL_SEVERITY_NORMALIZED"
        fi
        if [ -n "$MASK_VALUES" ]; then
          while IFS= read -r MASK_VALUE; do
            if [ -n "$MASK_VALUE" ]; then
              echo "::add-mask::$MASK_VALUE"
            fi
          done <<< "$MASK_VALUES"
        fi
        PROFILE_ARGS=()
        if [ -n "$PROFILE" ]; then
          PROFILE_ARGS+=(--profile "$PROFILE")
        fi
        CI_ARGS=()
        if [ "$CI_ENABLED" = "true" ]; then
          CI_ARGS+=(--ci)
        fi
        REPORT_DIR="$RUNNER_TEMP/devdiag-artifacts"
        REPORT_PATH="$REPORT_DIR/devdiag-report.json"
        mkdir -p "$REPORT_DIR"
        set +e
        devdiag scan --format "$FORMAT" --redact "$REDACT" --fail-severity "$EFFECTIVE_FAIL_SEVERITY" "${PROFILE_ARGS[@]}" "${CI_ARGS[@]}" -- "$PATH_ARG"
        SCAN_EXIT=$?
        devdiag scan --format json --redact "$REDACT" --fail-severity "$EFFECTIVE_FAIL_SEVERITY" "${PROFILE_ARGS[@]}" "${CI_ARGS[@]}" -- "$PATH_ARG" > "$REPORT_PATH"
        JSON_EXIT=$?
        set -e
        if [ ! -s "$REPORT_PATH" ]; then
          printf '{"error":"devdiag json report was not generated"}\n' > "$REPORT_PATH"
        fi
        if [ "$SUMMARY_ENABLED" = "true" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          {
            echo "### DevDiag scan"
            echo ""
            echo "- Report artifact: \`$ARTIFACT_NAME\`"
            echo "- Report path: \`$REPORT_PATH\`"
            echo "- Annotation scan exit: \`$SCAN_EXIT\`"
            echo "- JSON report exit: \`$JSON_EXIT\`"
          } >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "report-path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
        FINAL_EXIT=0
        for EXIT_CODE in "$SCAN_EXIT" "$JSON_EXIT"; do
          if [ "$EXIT_CODE" -eq 0 ]; then
            continue
          fi
          if [ "$EXIT_CODE" -eq 1 ] && [ "$FAIL_ON_FINDINGS_ENABLED" = "false" ]; then
            continue
          fi
          FINAL_EXIT="$EXIT_CODE"
          if [ "$EXIT_CODE" -ne 1 ]; then
            break
          fi
        done
        exit "$FINAL_EXIT"
      shell: bash
      env:
        PATH_ARG: ${{ inputs.path }}
        FORMAT: ${{ inputs.format }}
        REDACT: ${{ inputs.redact }}
        PROFILE: ${{ inputs.profile }}
        CI: ${{ inputs.ci }}
        SUMMARY: ${{ inputs.summary }}
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        FAIL_SEVERITY: ${{ inputs.fail-severity }}
        MASK_VALUES: ${{ inputs.mask-values }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ runner.temp }}/devdiag-artifacts/devdiag-report.json
