name: 'DevDiag'
description: 'Run DevDiag diagnostic scan and annotate findings in GitHub Actions'
inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  profile:
    description: 'Diagnostic profile (e.g., ai-ml)'
    required: false
    default: ''
  rule-pack:
    description: 'Path to an external deterministic rule pack'
    required: false
    default: ''
  redact:
    description: 'Redaction level: default, strict, off'
    required: false
    default: 'default'
  ci:
    description: 'Force CI/local parity collection and evaluation'
    required: false
    default: 'true'
  include-hidden:
    description: 'Include low/info and configured hidden findings in rendered and saved reports'
    required: false
    default: 'false'
  save-report:
    description: 'Save report and upload as JSON artifact'
    required: false
    default: 'true'
  summary:
    description: 'Write a short GitHub job summary'
    required: false
    default: 'true'
  fail-on-findings:
    description: 'Fail the action when DevDiag reports high or critical findings (deprecated, use fail-severity)'
    required: false
    default: 'true'
  fail-severity:
    description: 'Minimum finding severity that fails the action: off, info, low, medium, high, critical'
    required: false
    default: 'high'
  artifact-name:
    description: 'Name for the uploaded JSON report artifact'
    required: false
    default: 'devdiag-report'
  format:
    description: 'Output format: github, human, json, ndjson, markdown'
    required: false
    default: 'github'
  mask-values:
    description: 'Newline-separated literal values to register with GitHub add-mask before running DevDiag'
    required: false
    default: ''
  use-system-devdiag:
    description: 'Whether to prefer using a preinstalled devdiag binary in PATH instead of building from the action source'
    required: false
    default: 'false'
outputs:
  report-path:
    description: 'Path to the generated JSON report artifact'
    value: ${{ steps.devdiag.outputs.report-path }}
  summary-written:
    description: 'Whether the action wrote a GitHub job summary'
    value: ${{ steps.devdiag.outputs.summary-written }}
  scan-exit-code:
    description: 'The raw exit code of the devdiag scan command'
    value: ${{ steps.devdiag.outputs.scan-exit-code }}
  report-uploaded:
    description: 'Whether the JSON report was uploaded as an artifact'
    value: ${{ steps.devdiag.outputs.report-uploaded }}
runs:
  using: 'composite'
  steps:
    - name: Check tool availability
      id: check-tools
      run: |
        if command -v devdiag >/dev/null 2>&1; then
          echo "devdiag-found=true" >> "$GITHUB_OUTPUT"
        else
          echo "devdiag-found=false" >> "$GITHUB_OUTPUT"
        fi
        if command -v go >/dev/null 2>&1; then
          echo "go-found=true" >> "$GITHUB_OUTPUT"
        else
          echo "go-found=false" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Set up Go
      if: steps.check-tools.outputs.go-found != 'true' && (inputs.use-system-devdiag != 'true' || steps.check-tools.outputs.devdiag-found != 'true')
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Ensure devdiag binary is prepared
      run: |
        if [ "${{ inputs.use-system-devdiag }}" = "true" ] && [ "${{ steps.check-tools.outputs.devdiag-found }}" = "true" ]; then
          echo "Using preinstalled devdiag binary from system PATH."
        else
          if [ -f "${{ github.action_path }}/go.mod" ]; then
            echo "Building devdiag from action source in ${{ github.action_path }}..."
            mkdir -p "$RUNNER_TEMP/devdiag-bin"
            (cd "${{ github.action_path }}" && go build -v -o "$RUNNER_TEMP/devdiag-bin/devdiag" ./cmd/devdiag)
            echo "$RUNNER_TEMP/devdiag-bin" >> "$GITHUB_PATH"
          else
            echo "Error: devdiag not preinstalled and action source is not available."
            exit 1
          fi
        fi
      shell: bash

    - name: Execute DevDiag scan
      id: devdiag
      run: |
        # Run action helper script
        "${{ github.action_path }}/scripts/action.sh"
      shell: bash
      env:
        PATH_ARG: ${{ inputs.path }}
        FORMAT: ${{ inputs.format }}
        REDACT: ${{ inputs.redact }}
        PROFILE: ${{ inputs.profile }}
        CI: ${{ inputs.ci }}
        SUMMARY: ${{ inputs.summary }}
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
        FAIL_SEVERITY: ${{ inputs.fail-severity }}
        MASK_VALUES: ${{ inputs.mask-values }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
        RULE_PACK: ${{ inputs.rule-pack }}
        INCLUDE_HIDDEN: ${{ inputs.include-hidden }}
        SAVE_REPORT: ${{ inputs.save-report }}

    - name: Upload JSON Report Artifact
      uses: actions/upload-artifact@v4
      if: always() && inputs.save-report == 'true' && steps.devdiag.outputs.report-uploaded == 'true'
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ runner.temp }}/devdiag-artifacts/devdiag-report.json
