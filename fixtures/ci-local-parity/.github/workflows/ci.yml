name: ci
on: [push]
env:
  API_KEY: ${{ secrets.API_KEY }}
jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine
    services:
      postgres:
        image: postgres:14
        ports:
          - "5432:5432"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
